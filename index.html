<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proyecto Hugo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{

background:#081523;

color:#fff;

padding:15px;

}

.container{

max-width:1400px;

margin:auto;

}

h1{

text-align:center;

font-size:32px;

margin-bottom:20px;

}

.top{

display:flex;

gap:15px;

margin-bottom:20px;

flex-wrap:wrap;

}

.card{

flex:1;

background:#13263d;

border-radius:15px;

padding:18px;

text-align:center;

box-shadow:0 5px 15px rgba(0,0,0,.4);

}

.card h2{

font-size:14px;

margin-bottom:8px;

color:#9ecbff;

}

.card p{

font-size:30px;

font-weight:bold;

}

.tableBox{

background:#13263d;

border-radius:15px;

overflow:auto;

box-shadow:0 5px 15px rgba(0,0,0,.4);

}

table{

width:100%;

border-collapse:collapse;

min-width:950px;

}

thead{

position:sticky;

top:0;

z-index:999;

}

th{

background:#1b4e87;

padding:12px;

font-size:13px;

text-align:center;

}

td{

padding:11px;

text-align:center;

font-size:13px;

border-bottom:1px solid rgba(255,255,255,.08);

}

tbody tr:nth-child(even){

background:#17304d;

}

tbody tr:hover{

background:#1d3c61;

}

.positivo{

color:#38ff7b;

font-weight:bold;

}

.negativo{

color:#ff5b5b;

font-weight:bold;

}

.acumulado{

color:#6bc5ff;

font-weight:bold;

}

footer{

margin-top:20px;

text-align:center;

color:#8fa8c4;

font-size:13px;

letter-spacing:3px;

}

@media(max-width:768px){

body{

padding:8px;

}

h1{

font-size:22px;

}

.top{

gap:8px;

}

.card{

padding:10px;

}

.card h2{

font-size:12px;

}

.card p{

font-size:22px;

}

table{

min-width:900px;

}

th{

font-size:11px;

padding:8px;

}

td{

font-size:11px;

padding:8px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>TRANSACCIONES</h1>

<div class="top">

<div class="card">
<h2>CAPITAL INICIAL</h2>
<p id="capitalInicial">-</p>
</div>

<div class="card">
<h2>CAPITAL FINAL</h2>
<p id="capitalFinal">-</p>
</div>

</div>

<div class="tableBox">

<table>

<thead id="thead"></thead>

<tbody id="tbody"></tbody>

</table>

</div>

<footer>

PROYECTO HUGO

</footer>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbxcdEgTZeVoH5ESUIdFaTOfOVWuqXMSypVGZONOKG7kkOdpVz3z71cu1KtzrKyUa8PKTw/exec?api=1";

async function cargar(){

const r=await fetch(URL);

const datos=await r.json();

document.getElementById("capitalInicial").innerText=datos[1][1];

document.getElementById("capitalFinal").innerText=datos[2][1];

const encabezados=datos[5];

let head="<tr>";

encabezados.forEach(c=>head+="<th>"+c+"</th>");

head+="</tr>";

document.getElementById("thead").innerHTML=head;

let body="";

for(let i=6;i<datos.length;i++){

body+="<tr>";

for(let j=0;j<datos[i].length;j++){

let valor=datos[i][j];

if(j==7){

let n=parseFloat(String(valor).replace(",","."))

if(!isNaN(n)){

if(n>=0)

body+='<td class="positivo">'+valor+'</td>';

else

body+='<td class="negativo">'+valor+'</td>';

}else{

body+="<td>"+valor+"</td>";

}

}

else if(j==8){

body+='<td class="acumulado">'+valor+'</td>';

}

else{

body+="<td>"+valor+"</td>";

}

}

body+="</tr>";

}

document.getElementById("tbody").innerHTML=body;

}

cargar();

setInterval(cargar,5000);

</script>

</body>
</html>
