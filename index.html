<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proyecto Hugo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{

background:#edf2f7;

padding:15px;

color:#243447;

}

.container{

max-width:900px;

margin:auto;

}

h1{

text-align:center;

margin-bottom:20px;

font-size:30px;

color:#1d3557;

}

.resumen{

display:flex;

gap:15px;

margin-bottom:20px;

flex-wrap:wrap;

}

.card{

flex:1;

background:white;

padding:18px;

border-radius:18px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

text-align:center;

}

.card h2{

font-size:14px;

margin-bottom:8px;

color:#7b8794;

}

.card p{

font-size:30px;

font-weight:bold;

color:#1565c0;

}

#tabla{

display:flex;

flex-direction:column;

gap:18px;

}

.operacion{

border-radius:18px;

padding:18px;

box-shadow:0 6px 15px rgba(0,0,0,.08);

transition:.25s;

}

.operacion:hover{

transform:translateY(-2px);

}

.positivo{

background:#eef8f1;

border-left:8px solid #63b67b;

}

.negativo{

background:#fdeeee;

border-left:8px solid #d86c6c;

}

.fecha{

font-size:15px;

font-weight:bold;

margin-bottom:18px;

color:#2d4b6d;

}

.fila{

display:grid;

grid-template-columns:45% 55%;

gap:15px;

}

.izquierda{

display:flex;

flex-direction:column;

gap:18px;

}

.bloque{

display:flex;

flex-direction:column;

}

.titulo{

font-size:11px;

font-weight:bold;

letter-spacing:1px;

color:#7d8b99;

margin-bottom:5px;

text-transform:uppercase;

}

.valor{

font-size:18px;

font-weight:bold;

color:#23364a;

}

.derecha{

display:flex;

flex-direction:column;

gap:10px;

justify-content:center;

}

.item{

display:flex;

justify-content:space-between;

align-items:center;

padding:7px 0;

border-bottom:1px solid rgba(0,0,0,.05);

}

.item span:first-child{

font-size:13px;

color:#6f7c89;

font-weight:600;

}

.item span:last-child{

font-size:15px;

font-weight:bold;

color:#243447;

}

.gananciaPositiva{

color:#239b56 !important;

}

.gananciaNegativa{

color:#c0392b !important;

}

footer{

margin-top:25px;

text-align:center;

font-size:13px;

letter-spacing:3px;

color:#7f8c99;

}

@media(max-width:700px){

body{

padding:8px;

}

h1{

font-size:22px;

}

.card{

padding:12px;

}

.card p{

font-size:22px;

}

.fila{

grid-template-columns:1fr 1fr;

gap:10px;

}

.valor{

font-size:15px;

}

.item span:first-child{

font-size:11px;

}

.item span:last-child{

font-size:12px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>TRANSACCIONES</h1>

<div class="resumen">

<div class="card">

<h2>CAPITAL INICIAL</h2>

<p id="capitalInicial">-</p>

</div>

<div class="card">

<h2>CAPITAL FINAL</h2>

<p id="capitalFinal">-</p>

</div>

</div>

<div id="tabla"></div>

<footer>

PROYECTO HUGO

</footer>

<script>
  const URL="https://script.google.com/macros/s/AKfycbxcdEgTZeVoH5ESUIdFaTOfOVWuqXMSypVGZONOKG7kkOdpVz3z71cu1KtzrKyUa8PKTw/exec?api=1";

async function cargar(){

const r=await fetch(URL);

const datos=await r.json();

document.getElementById("capitalInicial").innerText=datos[1][1];
document.getElementById("capitalFinal").innerText=datos[2][1];

let html="";

for(let i=datos.length-1;i>=6;i--){

let fecha=datos[i][0];
let moneda=datos[i][1];
let cantidad=datos[i][2];
let compra=datos[i][3];
let venta=datos[i][4];
let spread=datos[i][5];
let ganancia=datos[i][7];

let numero=parseFloat(
String(ganancia)
.replace("%","")
.replace(",",".")
);

let clase=numero>=0?"positivo":"negativo";
let color=numero>=0?"gananciaPositiva":"gananciaNegativa";

html+=`

<div class="operacion ${clase}">

<div class="fecha">

📅 ${fecha}

</div>

<div class="fila">

<div class="izquierda">

<div class="bloque">

<div class="titulo">

MONEDA

</div>

<div class="valor">

${moneda}

</div>

</div>

<div class="bloque">

<div class="titulo">

CANTIDAD USADA

</div>

<div class="valor">

${cantidad} USD

</div>

</div>

</div>

<div class="derecha">

<div class="item">

<span>Precio Compra</span>

<span>${compra}</span>

</div>

<div class="item">

<span>Precio Venta</span>

<span>${venta}</span>

</div>

<div class="item">

<span>Spread</span>

<span>${spread}</span>

</div>

<div class="item">

<span>Ganancia</span>

<span class="${color}">

${ganancia} USD

</span>

</div>

</div>

</div>

</div>

`;

}

document.getElementById("tabla").innerHTML=html;

}

cargar();

setInterval(cargar,5000);

</script>

</body>

</html>
