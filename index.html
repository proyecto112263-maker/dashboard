<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROYECTO HUGO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;
}

body{

background:#eef3f8;

padding:15px;

color:#243447;

}

.container{

max-width:900px;

margin:auto;

}

h1{

text-align:center;

margin-bottom:20px;

font-size:32px;

color:#1d3557;

}

.resumen{

display:flex;

gap:15px;

margin-bottom:20px;

flex-wrap:wrap;

}

.card{

flex:1;

background:white;

padding:18px;

border-radius:16px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

text-align:center;

}

.card h2{

font-size:14px;

margin-bottom:8px;

color:#6c7b8a;

}

.card p{

font-size:30px;

font-weight:bold;

color:#1565c0;

}

table{

width:100%;

border-collapse:separate;

border-spacing:0 14px;

}

th{

text-align:left;

padding:12px;

font-size:14px;

color:#607080;

}

td{

vertical-align:top;

}

.operacion{

background:white;

border-radius:18px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

overflow:hidden;

transition:.25s;

}

.operacion:hover{

transform:translateY(-2px);

box-shadow:0 10px 20px rgba(0,0,0,.12);

}

.ganancia{

background:#edf9f0;

border-left:8px solid #61b883;

}

.perdida{

background:#fdeeee;

border-left:8px solid #df6b6b;

}

.fecha{

width:120px;

padding:18px;

font-weight:bold;

font-size:16px;

color:#234;

}

.moneda{

width:180px;

padding:18px;

}

.moneda strong{

font-size:18px;

display:block;

margin-bottom:5px;

}

.resultado{

padding:18px;

line-height:1.8;

font-size:14px;

}

.label{

font-weight:bold;

color:#506070;

}

.positivo{

color:#239b56;

font-weight:bold;

}

.negativo{

color:#c0392b;

font-weight:bold;

}

.acumulado{

color:#1565c0;

font-weight:bold;

}

footer{

margin-top:25px;

text-align:center;

color:#789;

font-size:13px;

letter-spacing:3px;

}

@media(max-width:768px){

body{

padding:8px;

}

h1{

font-size:24px;

}

.card{

padding:12px;

}

.card p{

font-size:22px;

}

th{

display:none;

}

table{

border-spacing:0 10px;

}

.fecha{

width:85px;

padding:12px;

font-size:13px;

}

.moneda{

width:110px;

padding:12px;

}

.moneda strong{

font-size:15px;

}

.resultado{

padding:12px;

font-size:12px;

line-height:1.6;

}

}

</style>

</head>

<body>

<div class="container">

<h1>TRANSACCIONES</h1>

<div class="resumen">

<div class="card">
<h2>CAPITAL INICIAL</h2>
<p id="capitalInicial">-</p>
</div>

<div class="card">
<h2>CAPITAL FINAL</h2>
<p id="capitalFinal">-</p>
</div>

</div>

<table>

<thead>

<tr>

<th style="width:120px;">FECHA</th>

<th style="width:180px;">OPERACIÓN</th>

<th>RESULTADO</th>

</tr>

</thead>

<tbody id="tabla">

</tbody>

</table>

<footer>

PROYECTO HUGO

</footer>

</div>

<script>
  const URL="https://script.google.com/macros/s/AKfycbxcdEgTZeVoH5ESUIdFaTOfOVWuqXMSypVGZONOKG7kkOdpVz3z71cu1KtzrKyUa8PKTw/exec?api=1";

async function cargar(){

const r=await fetch(URL);

const datos=await r.json();

document.getElementById("capitalInicial").innerText=datos[1][1];

document.getElementById("capitalFinal").innerText=datos[2][1];

let html="";

for(let i=datos.length-1;i>=6;i--){

let ganancia=parseFloat(String(datos[i][7]).replace(",","."))||0;

let clase=ganancia>=0?"ganancia":"perdida";

let color=ganancia>=0?"positivo":"negativo";

html+=`

<tr>

<td colspan="3">

<div class="operacion ${clase}">

<table style="width:100%;border-collapse:collapse;">

<tr>

<td class="fecha">

${datos[i][0]}

</td>

<td class="moneda">

<strong>${datos[i][1]}</strong>

${datos[i][2]} USD

</td>

<td class="resultado">

<div><span class="label">Precio Compra:</span> ${datos[i][3]}</div>

<div><span class="label">Precio Venta:</span> ${datos[i][4]}</div>

<div><span class="label">Porcentaje Ganancia:</span> ${datos[i][5]}</div>

<div><span class="label">Porcentaje de Ganancia X:</span> ${datos[i][6]}</div>

<div><span class="label">Ganancia Dólares:</span>

<span class="${color}">${datos[i][7]}</span>

</div>

<div><span class="label">Ganancia Acumulada Dólares:</span>

<span class="acumulado">${datos[i][8]}</span>

</div>

</td>

</tr>

</table>

</div>

</td>

</tr>

`;

}

document.getElementById("tabla").innerHTML=html;

}

cargar();

setInterval(cargar,5000);

</script>

</body>

</html>
