<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard de Transacciones</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{

background:linear-gradient(180deg,#07111f,#0c2345,#1d5fbf);

color:white;

padding:10px;

}

.panel{

max-width:1400px;

margin:auto;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border-radius:18px;

padding:15px;

box-shadow:0 0 25px rgba(0,0,0,.45);

}

h1{

text-align:center;

font-size:28px;

margin-bottom:15px;

letter-spacing:2px;

}

.info{

display:flex;

gap:10px;

margin-bottom:15px;

}

.card{

flex:1;

background:rgba(255,255,255,.08);

border-radius:12px;

padding:10px;

text-align:center;

}

.card h2{

font-size:14px;

margin-bottom:5px;

}

.card p{

font-size:24px;

font-weight:bold;

color:#79d6ff;

}

.table-container{

overflow-x:auto;

-webkit-overflow-scrolling:touch;

border-radius:12px;

}

table{

width:100%;

border-collapse:collapse;

table-layout:fixed;

background:rgba(255,255,255,.05);

}

th{

background:#2d82ff;

padding:6px;

font-size:11px;

word-break:break-word;

}

td{

padding:6px;

font-size:11px;

text-align:center;

word-break:break-word;

border-bottom:1px solid rgba(255,255,255,.08);

}

tr:nth-child(even){

background:rgba(255,255,255,.03);

}

tr:hover{

background:rgba(255,255,255,.08);

}

@media(max-width:768px){

body{

padding:5px;

}

.panel{

padding:8px;

}

h1{

font-size:20px;

margin-bottom:10px;

}

.info{

gap:5px;

}

.card{

padding:8px;

}

.card h2{

font-size:11px;

}

.card p{

font-size:18px;

}

table{

font-size:8px;

}

th{

font-size:8px;

padding:3px;

}

td{

font-size:8px;

padding:3px;

}

}

</style>

</head>

<body>

<div class="panel">

<h1>TRANSACCIONES</h1>

<div class="info">

<div class="card">
<h2>Capital Inicial</h2>
<p id="capitalInicial">-</p>
</div>

<div class="card">
<h2>Capital Final</h2>
<p id="capitalFinal">-</p>
</div>

</div>

<div class="table-container">

<table id="tabla"></table>

</div>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbxcdEgTZeVoH5ESUIdFaTOfOVWuqXMSypVGZONOKG7kkOdpVz3z71cu1KtzrKyUa8PKTw/exec?api=1";

const nombres={

"FECHA":"FECHA",

"MONEDA":"MONEDA",

"CANTIDAD DOLARES":"CANT.",

"PRECIO COMPRA":"COMPRA",

"PRECIO VENTA":"VENTA",

"PORCENTAJE GANANCIA":"%",

"PORCENTAJE DE GANANCIA X":"% X",

"GANANCIA DOLARES":"GAN.",

"GANANCIA ACUMULADA DOLARES":"CAPITAL"

};

async function cargar(){

const r=await fetch(URL);

const datos=await r.json();

document.getElementById("capitalInicial").textContent=datos[1][1];
document.getElementById("capitalFinal").textContent=datos[2][1];

let html="";

for(let i=5;i<datos.length;i++){

html+="<tr>";

for(let j=0;j<datos[i].length;j++){

if(i==5){

const titulo=nombres[datos[i][j]] || datos[i][j];

html+="<th>"+titulo+"</th>";

}else{

html+="<td>"+datos[i][j]+"</td>";

}

}

html+="</tr>";

}

document.getElementById("tabla").innerHTML=html;

}

cargar();

setInterval(cargar,5000);

</script>

</body>
</html>
