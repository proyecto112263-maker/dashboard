<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Transacciones</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{

background:linear-gradient(180deg,#07111f,#0c2345,#1d5fbf);

min-height:100vh;

padding:20px;

color:white;

}

.panel{

max-width:1400px;

margin:auto;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border-radius:18px;

padding:20px;

box-shadow:0 0 35px rgba(0,0,0,.5);

}

h1{

text-align:center;

margin-bottom:20px;

font-size:34px;

letter-spacing:2px;

}

.info{

display:flex;

gap:20px;

margin-bottom:25px;

flex-wrap:wrap;

}

.card{

flex:1;

min-width:220px;

background:rgba(255,255,255,.08);

padding:20px;

border-radius:15px;

text-align:center;

}

.card h2{

font-size:16px;

margin-bottom:10px;

}

.card p{

font-size:30px;

font-weight:bold;

color:#7fd7ff;

}

.table-container{

overflow:auto;

border-radius:12px;

}

table{

width:100%;

border-collapse:collapse;

background:rgba(255,255,255,.05);

}

th{

background:#2d82ff;

padding:12px;

white-space:nowrap;

}

td{

padding:10px;

text-align:center;

border-bottom:1px solid rgba(255,255,255,.08);

white-space:nowrap;

}

tr:nth-child(even){

background:rgba(255,255,255,.03);

}

tr:hover{

background:rgba(255,255,255,.10);

}

@media(max-width:700px){

body{

padding:10px;

}

.card p{

font-size:24px;

}

table{

font-size:12px;

}

}

</style>

</head>

<body>

<div class="panel">

<h1>TRANSACCIONES</h1>

<div class="info">

<div class="card">

<h2>Capital Inicial</h2>

<p id="capitalInicial">-</p>

</div>

<div class="card">

<h2>Capital Final</h2>

<p id="capitalFinal">-</p>

</div>

</div>

<div class="table-container">

<table id="tabla"></table>

</div>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbxcdEgTZeVoH5ESUIdFaTOfOVWuqXMSypVGZONOKG7kkOdpVz3z71cu1KtzrKyUa8PKTw/exec?api=1";

async function cargar(){

const r=await fetch(URL);

const datos=await r.json();

document.getElementById("capitalInicial").innerText=datos[1][1];

document.getElementById("capitalFinal").innerText=datos[2][1];

let html="";

for(let i=5;i<datos.length;i++){

html+="<tr>";

for(let j=0;j<datos[i].length;j++){

if(i==5)

html+="<th>"+datos[i][j]+"</th>";

else

html+="<td>"+datos[i][j]+"</td>";

}

html+="</tr>";

}

document.getElementById("tabla").innerHTML=html;

}

cargar();

setInterval(cargar,5000);

</script>

</body>
</html>
